# 所有可变参数集中在此。模板里用 {{ .Values.xxx }} 引用。
# 命名空间不写在这里——用 `helm install -n iot --create-namespace` 由 Release 决定（Helm 惯例）。

mysql:
  image: mysql:8.0
  rootPassword: example123
  database: iot
  storage: 1Gi

redis:
  image: redis:7-alpine
  password: redis123
  storage: 1Gi

tdengine:
  image: tdengine/tsdb:3.3.7.0
  storage: 1Gi

emqx:
  image: emqx/emqx:5.10.4
  storage: 1Gi

backend:
  image: iot-backend:dev
  replicas: 1
