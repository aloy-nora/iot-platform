# ⚠️ 安全说明：下方密码均为【本地 demo 默认值】，非真实密钥，仅供本地 kind 演示。
#    生产环境请勿直接使用，用 K8s Secret / 外部密钥管理注入覆盖
#    （如 helm install --set mysql.rootPassword=xxx，或 -f values-secret.yaml 且该文件加入 .gitignore）。
#
# 所有可变参数集中在此。模板里用 {{ .Values.xxx }} 引用。
# 命名空间不写在这里——用 `helm install -n iot --create-namespace` 由 Release 决定（Helm 惯例）。

mysql:
  image: mysql:8.0
  rootPassword: example123
  database: iot
  storage: 1Gi

redis:
  image: redis:7-alpine
  password: redis123
  storage: 1Gi

tdengine:
  image: tdengine/tsdb:3.3.7.0
  storage: 1Gi

emqx:
  image: emqx/emqx:5.10.4
  storage: 1Gi

backend:
  image: ghcr.io/aloy-nora/iot-backend:61239fdd4a0c7765e7859d7f7be446e7dfc20b14
  replicas: 1

grafana:
  enabled: true         # 做监控，开回来接 Prometheus
  image: grafana/grafana:12.4.4
  adminUser: admin
  adminPassword: admin123
  storage: 1Gi

mediamtx:
  enabled: false        # 资源紧张，暂时关闭（改 true 即恢复）
  image: bluenviron/mediamtx:1.19.1-ffmpeg

prometheus:
  enabled: true
  image: quay.io/prometheus/prometheus:v3.1.0   # 用 quay（Docker Hub 被墙），节点直连可拉

loki:
  enabled: true
  image: grafana/loki:3.4.1
  storage: 1Gi          # 预留；本轮先用 emptyDir，PVC 以后再说

promtail:
  enabled: true
  image: grafana/promtail:3.4.1

tempo:
  enabled: true
  image: grafana/tempo:2.6.1

alertmanager:
  enabled: true
  image: quay.io/prometheus/alertmanager:v0.27.0   # 用 quay（Docker Hub 被墙），节点直连可拉
