{{- if .Values.tempo.enabled }}
# Tempo：分布式追踪后端（Grafana 家的，只索引 trace ID、正文压存，轻量）。单体模式，够 demo。
# 接收 OTLP（应用发 span 的标准协议）：gRPC 4317 / HTTP 4318；查询/HTTP 端口 3200。
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
data:
  tempo.yaml: |
    stream_over_http_enabled: true
    server:
      http_listen_port: 3200          # 查询/API 端口，Grafana 数据源连这个
    distributor:
      receivers:
        otlp:                          # 开 OTLP 接收器，收应用发来的 span
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
    ingester:
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 24h           # trace 留 24h（demo 够）
    storage:
      trace:
        backend: local                 # 本地文件存储（非对象存储），最省事
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/blocks
    usage_report:
      reporting_enabled: false         # 关联网上报（离线环境别卡）
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      # tempo 镜像以 UID/GID 10001 运行；emptyDir 默认 root 属主，写不进 /var/tempo。
      # fsGroup=10001 让卷属组=10001 → 可写（同 loki/grafana 那个卷权限坑）。
      securityContext:
        fsGroup: 10001
      containers:
        - name: tempo
          image: {{ .Values.tempo.image }}
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - { name: http,      containerPort: 3200 }   # 查询
            - { name: otlp-grpc, containerPort: 4317 }    # 收 span（gRPC）
            - { name: otlp-http, containerPort: 4318 }    # 收 span（HTTP）
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          emptyDir: {}                 # demo：重启丢 trace 可接受；要持久化改 PVC
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
spec:
  type: ClusterIP
  selector:
    app: tempo
  ports:
    - { name: http,      port: 3200, targetPort: 3200 }   # Grafana 数据源用
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }   # 后端发 span 用
    - { name: otlp-http, port: 4318, targetPort: 4318 }
{{- end }}
