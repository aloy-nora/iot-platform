apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdengine-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.tdengine.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdengine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdengine
  template:
    metadata:
      labels:
        app: tdengine
    spec:
      containers:
        - name: tdengine
          image: {{ .Values.tdengine.image }}
          env:
            - name: TAOS_FQDN
              value: localhost
            - name: TZ
              value: Asia/Shanghai
            - name: TAOS_TIMEZONE
              value: Asia/Shanghai
          ports:
            - containerPort: 6041
            - containerPort: 6060
          volumeMounts:
            - name: taos-storage
              mountPath: /var/lib/taos
              subPath: data
            - name: taos-storage
              mountPath: /var/log/taos
              subPath: log
          readinessProbe:
            tcpSocket:
              port: 6041
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 6041
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    until taos -s 'show databases' >/dev/null 2>&1; do sleep 2; done
                    taos -s 'CREATE DATABASE IF NOT EXISTS iot'
                    taos -s 'CREATE STABLE IF NOT EXISTS iot.env_sensor (ts TIMESTAMP, temp FLOAT, humi FLOAT, light INT, soil_ph FLOAT) TAGS (device_id NCHAR(32), location NCHAR(64), dev_type NCHAR(16))'
      volumes:
        - name: taos-storage
          persistentVolumeClaim:
            claimName: tdengine-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tdengine
spec:
  type: ClusterIP
  selector:
    app: tdengine
  ports:
    - port: 6041
      targetPort: 6041
