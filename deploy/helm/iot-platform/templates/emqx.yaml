apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: emqx-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.emqx.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emqx
  template:
    metadata:
      labels:
        app: emqx
    spec:
      containers:
        - name: emqx
          image: {{ .Values.emqx.image }}
          ports:
            - containerPort: 1883
              name: mqtt
            - containerPort: 8083
              name: mqtt-websocket
            - containerPort: 18083
              name: emqx-dashboard
          volumeMounts:
            - name: emqx-storage
              mountPath: /opt/emqx/data
              subPath: data
            - name: emqx-storage
              mountPath: /opt/emqx/log
              subPath: log
          readinessProbe:
            exec:
              command: ["/opt/emqx/bin/emqx", "ctl", "status"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/opt/emqx/bin/emqx", "ctl", "status"]
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: emqx-storage
          persistentVolumeClaim:
            claimName: emqx-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: emqx
spec:
  type: ClusterIP
  selector:
    app: emqx
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
    - name: mqtt-ws
      port: 8083
      targetPort: 8083
