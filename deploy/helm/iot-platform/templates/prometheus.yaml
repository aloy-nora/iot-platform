{{- if .Values.prometheus.enabled }}
# Prometheus：抓取后端 /actuator/prometheus，攒时序指标供 Grafana 查询。
# 只挂配置文件；数据目录用镜像自带的 /prometheus（nobody 可写、临时），避开卷权限问题。
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s          # 每 15s 抓一次
    scrape_configs:
      - job_name: iot-backend
        metrics_path: /actuator/prometheus     # Spring 的指标端点
        static_configs:
          - targets: ['backend:8080']          # 用 Service DNS 直接指后端
      - job_name: prometheus                    # 自监控
        static_configs:
          - targets: ['localhost:9090']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml   # 镜像默认从这里读配置
              subPath: prometheus.yml
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
{{- end }}
