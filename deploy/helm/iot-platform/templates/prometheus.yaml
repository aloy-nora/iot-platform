{{- if .Values.prometheus.enabled }}
# Prometheus：抓取后端 /actuator/prometheus，攒时序指标供 Grafana 查询。
# 只挂配置文件；数据目录用镜像自带的 /prometheus（nobody 可写、临时），避开卷权限问题。
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s          # 每 15s 抓一次
    rule_files:
      - /etc/prometheus/rules.yml               # 加载告警规则文件
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']     # firing 告警发给 Alertmanager
    scrape_configs:
      - job_name: iot-backend
        metrics_path: /actuator/prometheus     # Spring 的指标端点
        static_configs:
          - targets: ['backend:8080']          # 用 Service DNS 直接指后端
      - job_name: prometheus                    # 自监控
        static_configs:
          - targets: ['localhost:9090']
  # 告警规则（注：annotations 故意不用 Prometheus 的双花括号插值，避免与 Helm 模板冲突）
  rules.yml: |
    groups:
      - name: demo-alerts
        rules:
          - alert: AlwaysFiringDemo                # 恒触发，验证告警链路是否打通
            expr: vector(1)
            for: 0m
            labels: { severity: info }
            annotations: { summary: "演示告警：恒触发，用于验证 Prometheus→Alertmanager 链路" }
          - alert: TargetDown                      # 抓取目标掉线
            expr: up == 0
            for: 1m
            labels: { severity: critical }
            annotations: { summary: "有抓取目标掉线（up==0）" }
          - alert: BackendHeapHigh                 # 后端堆内存 >90%
            expr: sum(jvm_memory_used_bytes{area="heap"}) / sum(jvm_memory_max_bytes{area="heap"}) > 0.9
            for: 2m
            labels: { severity: warning }
            annotations: { summary: "后端堆内存使用率超过 90%" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml   # 镜像默认从这里读配置
              subPath: prometheus.yml
            - name: config
              mountPath: /etc/prometheus/rules.yml        # 告警规则（rule_files 引用）
              subPath: rules.yml
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
{{- end }}
