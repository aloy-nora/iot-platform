apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  application.yaml: |
    spring:
      data:
        redis:
          host: redis
    mqtt:
      url: tcp://emqx:1883
    datasource:
      mysql:
        jdbc-url: "jdbc:mysql://mysql:3306/iot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"
      tdengine:
        jdbc-url: "jdbc:TAOS-WS://tdengine:6041/iot?user=root&password=taosdata"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: 2         # 只留 2 个旧 RS 供回滚，其余自动回收（CI 频繁改镜像会攒一堆空 RS）
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: file:/config/
            - name: TZ
              value: Asia/Shanghai
            # OpenTelemetry 自动埋点：挂 agent + 把 trace 发给 Tempo（OTLP gRPC 4317）
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/app/otel-javaagent.jar"
            - name: OTEL_SERVICE_NAME
              value: iot-backend
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo:4318      # OTel agent 2.x 默认 http/protobuf → 用 4318（4317 是 gRPC）
            - name: OTEL_METRICS_EXPORTER          # 指标已用 Prometheus，别重复导出
              value: none
            - name: OTEL_LOGS_EXPORTER              # 日志已用 Loki
              value: none
          ports:
            - containerPort: 8080
              name: web
            - containerPort: 9000
              name: netty-tcp
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          startupProbe:                 # 慢启动保护：启动期间只探这个，成功后 liveness 才接管
            tcpSocket:
              port: 8080
            failureThreshold: 30         # 30 × 10s = 5 分钟启动窗口，资源紧时也不会被误杀
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
      volumes:
        - name: config
          configMap:
            name: backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: web
      port: 8080
      targetPort: 8080
