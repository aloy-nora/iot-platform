spring:
  application:
    name: iot-platform
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123

# MQTT 接入配置（无认证时 username/password 可省略）
mqtt:
  url: tcp://localhost:1883
  client-id: iot-platform-sub
  topics: device/+/data

# 双数据源（注意是 jdbc-url，不是 url——直接绑定到 HikariDataSource）
datasource:
  mysql:
    jdbc-url: jdbc:mysql://localhost:3306/iot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: example123
    driver-class-name: com.mysql.cj.jdbc.Driver
  tdengine:
    jdbc-url: jdbc:TAOS-WS://localhost:6041/iot?user=root&password=taosdata
    username: root
    password: taosdata
    driver-class-name: com.taosdata.jdbc.ws.WebSocketDriver
    connection-test-query: SELECT 1

# Modbus → MQTT 网关（W5）。enabled=false 可关闭模拟器+网关
modbus:
  enabled: true
  slave-port: 1502
  unit-id: 1
  device-id: modbus01
  poll-interval-ms: 5000

# Netty TCP 接入网关（W6）。enabled=false 可关闭服务端+模拟器
netty:
  enabled: true
  port: 9000
  device-id: tcp01
  send-interval-ms: 5000

# 告警阈值 + 离线判定（W7）
alarm:
  temp-min: 5
  temp-max: 32
  humi-min: 20
  humi-max: 85
  offline-seconds: 30

# 告警推送（W8）。webhook-url 为空走 dry-run 仅打印；填入企业微信/钉钉机器人地址即真推
push:
  enabled: true
  type: wecom
  webhook-url: ""
  dedup-seconds: 60

logging:
  level:
    com.example.iotplatform: INFO

# 监控：暴露 actuator 的 health 和 prometheus 端点（/actuator/prometheus 供 Prometheus 抓取）
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}   # 给所有指标打 application 标签，社区 Spring Boot 看板按它筛选
