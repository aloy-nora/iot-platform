name: CI

# 触发时机：push 到 master，或对 master 提 PR
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 授权：推镜像到 GHCR 需要 packages:write（用内置的 GITHUB_TOKEN，无需自己配密钥）
permissions:
  contents: write        # write：CI 要把新镜像 tag 写回 values.yaml 并推回
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest          # GitHub 提供的云端 runner（有网、有 docker）
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle             # 缓存 gradle 依赖，二次构建更快

      - name: 编译打包 bootJar
        run: ./gradlew bootJar --no-daemon
        # 暂不跑 test：部分测试要连数据库，CI 无 DB 会失败。后续接测试基建再开。

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # Actions 自动注入，无需手配

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/iot-backend:latest
            ghcr.io/${{ github.repository_owner }}/iot-backend:${{ github.sha }}

      # 把新镜像 tag 写回 values.yaml 并推回 → values 变化触发 ArgoCD 自动部署（真正的 CD 闭环）
      - name: 写回镜像 tag
        env:
          OWNER: ${{ github.repository_owner }}   # 用 env 承接 github 上下文，避免注入风险
          SHA: ${{ github.sha }}
        run: |
          sed -i -E "s|(image: ghcr.io/$OWNER/iot-backend:).*|\1$SHA|" deploy/helm/iot-platform/values.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/iot-platform/values.yaml
          git commit -m "ci: deploy $SHA [skip ci]" || { echo "无变化，跳过"; exit 0; }
          git push origin HEAD:master
